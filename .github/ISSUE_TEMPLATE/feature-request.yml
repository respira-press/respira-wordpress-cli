name: Feature request
description: Suggest a new command or capability
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What are you trying to do
      description: describe the workflow, not the implementation
    validations:
      required: true
  - type: textarea
    id: shape
    attributes:
      label: Shape of the command you'd like
      description: sketch the invocation and expected output
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you considered

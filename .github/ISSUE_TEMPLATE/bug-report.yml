name: Bug report
description: Report a problem with Respira CLI
labels: [bug]
body:
  - type: input
    id: version
    attributes:
      label: respira --version
      description: run `respira --version` and paste the output
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options: [macOS, Linux, Windows, other]
    validations:
      required: true
  - type: textarea
    id: what
    attributes:
      label: What happened
      description: include the exact command, the full output, and what you expected
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
    validations:
      required: true

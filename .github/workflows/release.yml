name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
      - name: install
        run: npm install
      - name: build
        run: npm run build --workspaces --if-present
      - name: test
        run: npm test --workspaces --if-present
      - name: publish @respira/cli-core
        run: npm publish --provenance --access public --workspace=@respira/cli-core
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: publish @respira/sdk
        run: npm publish --provenance --access public --workspace=@respira/sdk
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: publish @respira/cli
        run: npm publish --provenance --access public --workspace=@respira/cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
